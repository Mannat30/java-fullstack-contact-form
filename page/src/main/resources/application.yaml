spring:

  datasource:
    url: jdbc:mysql://localhost:3306/mannat
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true


  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false


server:
  port: 8081